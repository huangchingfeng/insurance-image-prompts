<script>
const DATA=[{"id":"story-a-01","t":"三代同堂台式客廳全家福","c":"情境故事圖","r":"1:1","g":["三代同堂","全家福","台式客廳"],"p":"溫潤水彩淡塗插畫風，柔和手繪線稿、低彩度療癒，不要寫實照片、不要3D塑膠感。畫面：當代台灣三代同堂全家福，阿公阿嬤花白短髮、爸媽黑髮、兩個小孩，都是東亞臉孔、自然健康膚色、單眼皮或內雙、當代台灣日常穿著，一起坐在台式磁磚地板客廳的布沙發上，背景有神明桌（觀音）、鋁窗、發財樹、繁中月曆。配色硬規則：背景牆面用乾淨淺冷灰藍 #EAF0F3（明令 NOT cream, NOT beige, NOT yellow-tinted，大面積留白禁止奶油黃）；品牌青綠定錨——媽媽上衣用沉穩 #00B4D8、沙發抱枕與小孩保溫瓶用亮 #00D4FF（至少2處清楚可見）；最深陰影與線稿輪廓用深藍 #0A1628；暖色只能小面積點綴 <15%（如小孩的小紅帽）。光線 soft natural daylight, neutral-to-cool ~5200K, no warm yellow color cast。構圖上方約30%留白給文字。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"情境關懷圖純溫暖陪伴，不含招攬文字、不出現保險商標/保單/保額。禁恐懼訴求。","img":"family-tw.jpg"},{"id":"story-a-04","t":"退休夫妻河濱步道散步","c":"情境故事圖","r":"16:9","g":["退休夫妻","河濱散步","悠閒"],"p":"扁平向量插畫加柔和手繪線稿，低彩度療癒、溫潤水彩感，不要寫實照片、不要3D塑膠感。畫面：一對台灣退休夫妻牽手在河濱步道散步，兩人花白短髮、自然健康膚色、單眼皮或內雙、當代台灣休閒穿著（夾克、運動鞋），東亞臉孔。背景河濱綠地、社區公園紅磚步道、遠方台北101剪影（不要紐約/歐洲）、有人騎 youbike 經過。配色硬規則：天空一律乾淨柔白 #FAFCFD（明令 NOT cream, NOT beige, NOT yellow-tinted）；teal 定錨——太太外套用沉穩 #00B4D8、先生隨身水壺用亮 #00D4FF（至少2處清楚可見）；最深陰影與線條用深藍 #0A1628；暖色僅步道紅磚與遠處小花 <15%。光線 soft natural daylight, neutral-to-cool ~5200K, no warm yellow color cast。畫面一側留白給文字。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"退休生活溫暖情境，不以財富自由/被動收入號召，不放保額理賠金額，不出現保險商標。","img":"retire-tw.jpg"},{"id":"story-a-07","t":"成年子女陪伴年邁母親居家","c":"情境故事圖","r":"1:1","g":["長照陪伴","母女","台式居家"],"p":"溫潤水彩淡塗插畫風，柔和手繪線稿、低彩度療癒，不要寫實照片、不要3D塑膠感、不要病床血淋淋。畫面：台灣中年女兒黑髮、陪伴年邁母親花白短髮一起坐在台式客廳布沙發，女兒輕扶母親的手、兩人微笑對望，東亞臉孔、自然健康膚色、單眼皮或內雙、當代台灣日常居家服，溫暖陪伴而非病弱。背景台式磁磚客廳、神明桌（媽祖）、鋁窗、紅色平安符、蝴蝶蘭。配色硬規則：背景牆用乾淨柔白 #FAFCFD（明令 NOT cream, NOT beige, NOT yellow-tinted，留白禁奶油黃）；teal 定錨——母親膝上薄毯用亮 #00D4FF、女兒上衣用沉穩 #00B4D8（至少2處清楚可見）；最深陰影與輪廓用深藍 #0A1628；暖色僅平安符紅 <15%。光線 soft natural daylight, neutral-to-cool ~5200K, no warm yellow color cast。上方約30%留白給文字。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"長照以溫暖陪伴呈現，禁病床/血淋淋/孤老/留債等恐懼或悲情訴求；不放保額理賠金額、不出現保單與保險商標。","img":"longcare-tw.jpg"},{"id":"story-b-01","t":"新手台灣爸媽抱新生兒的安心時刻","c":"情境故事圖","r":"1:1","g":["新生兒","年輕家庭","情境插畫"],"p":"溫潤水彩淡塗插畫、柔和手繪線稿、低彩度療癒風,不要寫實照片、不要3D塑膠感。畫面:一對當代台灣年輕爸媽——黑髮、自然健康膚色、單眼皮或內雙、台灣日常居家穿著——並肩坐在台式布沙發上,溫柔低頭看著懷中熟睡的新生兒,媽媽穿沉穩品牌青綠 #00B4D8 居家上衣,旁邊嬰兒推車旁掛著一條亮青綠 #00D4FF 的薄毯,茶几上放亮青綠 #00D4FF 保溫瓶,至少兩處 teal 清楚可見。背景客廳牆面用乾淨淺冷灰藍 #EAF0F3(NOT cream, NOT beige, NOT yellow-tinted),牆上掛繁中月曆與一株蝴蝶蘭,窗戶是不鏽鋼鐵窗花,最深陰影與線稿用深藍 #0A1628。暖色只在嬰兒小襪做極小面積點綴 <15%。soft natural daylight, neutral-to-cool ~5200K, no warm yellow color cast。構圖:畫面上方約30%留白給文字,可放繁中吉祥話或留白。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"合規:純情境陪伴溫暖風,不出現保額/理賠金額、不出現保險公司商標或保單。文案如預留業務員署名須標所屬公司全名+業務員登錄字號。禁用保證/最高/第一/唯一等字眼。","img":"newborn-tw.jpg"},{"id":"festival-a-01","t":"中秋烤肉團圓 · 一家人圍爐","c":"節慶賀圖","r":"1:1","g":["中秋","烤肉","團圓"],"p":"溫潤水彩淡塗插畫、柔和手繪線稿、低彩度療癒風。畫面是台灣社區中庭或自家頂樓陽台的中秋烤肉場景:一家三代當代台灣東亞臉孔——花白短髮的阿公阿嬤、自然健康膚色的中年夫妻、單眼皮孩童,當代台灣日常穿著(短袖T恤、polo衫、棉質家居服),圍著小烤肉架笑著夾肉串、傳遞玉米。場景配中秋深藍夜空 #0A1628 作 base,幾盞暖燈與圓月光點小面積點綴(<15%),牆面與地面留白用乾淨冷中性淺冷灰藍 #EAF0F3,NOT cream, NOT beige, NOT yellow-tinted。品牌青綠 teal 定錨:其中一人圍裙用沉穩 #00B4D8,桌上保溫瓶與夾子握把用亮 #00D4FF,至少兩處清楚可見;深藍 #0A1628 作最深陰影。光線 soft natural night glow,中性偏冷,僅烤肉爐口暖光例外。上方約30%留白放吉祥話「闔家團圓 中秋快樂」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純祝福賀圖,文字只放吉祥話不含招攬。若預留業務員署名,須標所屬公司全名+業務員登錄字號。禁字:保證/最高/第一/唯一。不放保額理賠金額、不出現保險公司商標或保單。","img":"midautumn-bbq.jpg"},{"id":"festival-a-02","t":"中秋賞月烤肉 · 鄰里同歡","c":"節慶賀圖","r":"16:9","g":["中秋","賞月","社區"],"p":"扁平向量插畫、柔和手繪線稿、低彩度療癒風。寬幅橫構圖描繪台灣騎樓巷弄旁的社區烤肉夜:幾戶鄰居當代台灣東亞臉孔(黑髮與花白短髮、自然健康膚色、內雙眼),穿當代日常衣著,沿紅磚步道擺小烤肉架,孩子拿仙女棒、大人舉杯互敬,背景有不鏽鋼鐵窗花的公寓、機車與台北101遠方剪影。中秋深藍夜空 #0A1628 作大面積 base,圓月與串燈暖光僅小面積點綴(<15%);近處牆面與地面留白用淺青綠 #E3F2F4,NOT cream, NOT beige, NOT yellow-tinted。teal 定錨:一位鄰居外套用 #00B4D8,串燈線與保溫瓶用亮 #00D4FF,至少兩處可見;深藍 #0A1628 最深陰影。光線中性偏冷的月夜,僅爐火暖點例外。右側一側留白放「中秋月圓 鄰里平安」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"節慶關懷純祝福,不含招攬語。署名須標所屬公司全名+業務員登錄字號。圖面不出現保險商標/商品名/保單/鈔票。禁字:保證/絕對/唯一/穩。","img":"festival-a-02.jpg"},{"id":"festival-a-03","t":"中秋柚子月餅 · 溫暖關懷卡","c":"節慶賀圖","r":"1:1","g":["中秋","柚子","月餅"],"p":"溫潤水彩淡塗插畫、柔和手繪線稿、低彩度療癒風。靜物關懷卡:台式磁磚桌面上擺一顆剝半的文旦柚、幾塊傳統月餅、一壺茶與兩個茶杯,旁邊一張手寫卡片,背景隱約有鋁窗與蝴蝶蘭。整體走乾淨明亮的白天氛圍而非夜景,背景牆面留白用柔白 #FAFCFD,NOT cream, NOT beige, NOT yellow-tinted,大面積留白禁止奶油黃。中秋暖色僅柚子與月餅本身小面積點綴(<15%)。品牌青綠 teal 定錨:茶壺與其中一個茶杯用亮 #00D4FF、桌巾條紋用沉穩 #00B4D8,至少兩處清楚可見;深藍 #0A1628 作最深陰影與卡片文字。光線 soft natural daylight, neutral-to-cool ~5200K, no warm yellow color cast。上方約30%留白放「柚見中秋 平安團圓」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純祝福關懷,文字只放吉祥話。署名須標所屬公司全名+業務員登錄字號。不放保額理賠金額、不出現保險公司商標/保單。禁字:保證/最高/第一/節稅/避稅。","img":"festival-a-03.jpg"},{"id":"festival-a-04","t":"中秋送柚問候 · 長輩關懷","c": ia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純問候賀圖,文字只放『週中加油』『為自己充電』等溫暖話語,不含招攬。不出現保險公司商標/商品名/保單/金額。預留業務員署名須標所屬公司全名+業務員登錄字號。","img":"care-c-09.jpg"},{"id":"care-c-10","t":"金榜題名祝福橫幅卡","c":"客戶關懷","r":"16:9","g":["金榜題名","升學祝福","橫幅"],"p":"扁平向量插畫、乾淨幾何資訊版型風、柔和手繪線稿,低彩度療癒,不要寫實照片、不要3D塑膠感。畫面右側:單一 teal 線條描繪的學士帽、上揚的成績曲線、一束蝴蝶蘭,象徵升學順利,構圖簡潔、大量負空間;可放一位當代台灣考生握拳加油剪影,黑髮、自然健康膚色、單眼皮、當代台灣日常制服穿著。背景用乾淨淺青綠 #E3F2F4(NOT cream, NOT beige, NOT yellow-tinted),負空間禁止奶油黃。品牌青綠 teal 定錨:學士帽與曲線用亮 #00D4FF、緞帶用沉穩 #00B4D8,至少兩處清楚;繁中標題『金榜題名 心想事成』與所有文字用深藍 #0A1628,零暖色。光線 soft natural daylight, neutral-to-cool ~5200K, no warm yellow cast。左側一側留白放文字。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純祝福賀圖,只放吉祥話不含招攬。不出現保險公司商標/商品名/保單/金額。預留業務員署名須標所屬公司全名+業務員登錄字號。","img":"care-c-10.jpg"},{"id":"concept-a-01","t":"一把傘，撐起四種保障","c":"社群觀念圖卡","r":"1:1","g":["保障觀念","扁平資訊圖","意外疾病失能長照"],"p":"溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風格,不要寫實照片、不要3D塑膠感。畫面正中央一把張開的大傘作為視覺主角,傘面用品牌青綠 teal #00D4FF 清楚填色,傘下方延伸四條細線連到四個簡潔小圖示:跌倒小人(意外)、體溫計(疾病)、輪椅(失能)、攙扶的雙手(長照),四個圖示外框用深藍 #0A1628 細線。背景牆面一律乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。深藍 #0A1628 作為文字與最深陰影,傘柄與一處小圓點用沉穩 teal #00B4D8 呼應(全畫至少兩處 teal 清楚可見)。暖色僅可極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁體中文短句「一把傘 撐起四種安心」或留白。整體零暖色大面積、扁平資訊圖質感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純觀念示意,不出現保額/理賠金額、保險公司商標、商品名或保單。長照以攙扶雙手溫暖呈現,禁病床血淋淋孤老畫面。文案僅放觀念金句,不含招攬。若預留業務員署名,須標所屬公司全名＋業務員登錄字號。避用保證/最高/第一/唯一/穩賺等禁字。","img":"concept-a-01.jpg"},{"id":"concept-a-02","t":"實支實付，醫療費用安全網","c":"社群觀念圖卡","r":"1:1","g":["實支實付","安全網比喻","扁平向量"],"p":"溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面中央一張交織的網子(像安全網),網繩用品牌青綠 teal #00D4FF 線條清楚編織,網子上方有幾個往下掉落的小圖示:藥袋、聽診器、點滴小瓶,被網子穩穩接住。網子兩端用深藍 #0A1628 固定點。背景牆面乾淨冷中性淺冷灰藍 #EAF0F3,大量留白,NOT cream, NOT beige, NOT yellow-tinted。網子接住的其中一個小物與一處固定釦用沉穩 teal #00B4D8,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%負空間留標題,可放繁中「醫療費用 有網接住」或留白,扁平資訊圖質感、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"觀念示意,不列實際理賠額度、自付額數字,不出現保險公司商標或商品名。安全網比喻僅作保障觀念,避免恐懼訴求。文字僅放觀念,不含招攬用語。預留署名須標公司全名＋業務員登錄字號。避用保證/一定賠/絕對/無風險等禁字。","img":"concept-a-02.jpg"},{"id":"concept-a-03","t":"保單健診，用放大鏡看清楚","c":"社群觀念圖卡","r":"1:1","g":["保單健診","放大鏡","檢視觀念"],"p":"溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面主角為一支放大鏡,鏡框用品牌青綠 teal #00D4FF 清楚描繪,放大鏡下方有一份簡化的文件示意圖(只用幾條深藍 #0A1628 橫線代表條列,不出現任何品牌名或真實保單),放大鏡聚焦處用淡淡 teal 圈出一個打勾的小圓圈。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。放大鏡握把與聚焦圈用沉穩 teal #00B4D8,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「保單健診 看清楚再安心」或留白,扁平資訊圖風、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"文件純示意,不顯示任何保險公司商標、商品名或真實保單內容。健診觀念中性呈現,不暗示原有保單不足以製造焦慮。不放保額數字。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/唯一等禁字。","img":"concept-a-03.jpg"},{"id":"concept-a-04","t":"雙實支，自費醫材也安心","c":"社群觀念圖卡","r":"1:1","g":["雙實支","自費醫材","達文西手術觀念"],"p":"溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面用兩層疊起的圓形盾牌示意「雙重」概念,兩個盾牌都用品牌青綠 teal(外層 #00B4D8、內層 #00D4FF)清楚區分,盾牌前方放一個簡潔的醫療器材小圖示(中性的手術器械或人工關節剪影,線條柔和、不血腥),用深藍 #0A1628 描邊。背景牆面乾淨冷中性淺青綠 #E3F2F4,大量留白,NOT cream, NOT beige, NOT yellow-tinted。確保兩層 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%負空間留標題,可放繁中「自費醫材 多一層準備」或留白,扁平資訊圖風、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"觀念示意,不出現達文西/特定機器商標或商品名,不列自費金額、理賠額度。醫材圖示中性不血腥,避免恐懼訴求。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對等禁字。","img":"concept-a-04.jpg"},{"id":"concept-a-05","t":"重大傷病，一次給付一份從容","c":"社群觀念圖卡","r":"1:1","g":["重大傷病","一次給付","從容觀念"],"p":"溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面中央一個被雙手溫柔捧住的圓形(象徵一次到位的支持),圓形用品牌青綠 teal #00D4FF 漸柔填色,雙手線條用深藍 #0A1628 柔和描繪,圓形旁邊一個小小的勾選標記表示「一次到位」。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。捧著的手腕處薄毯或袖口用沉穩 teal #00B4D8 點綴,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「一次給付 多一份從容」或留白,扁平資訊圖風、零大面積暖色、溫暖陪伴感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"重大傷病以溫暖陪伴呈現,禁病床、血淋淋、孤老、留債等恐懼畫面。不列給付金額、保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對/穩賺等禁字。","img":"concept-a-05.jpg"},{"id":"concept-a-06","t":"意外、疾病、失能，分層看保障","c":"社群觀念圖卡","r":"4:5","g":["保障分層","三層圖解","版型留白"],"p":"乾淨扁平資訊圖版型風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。直式版面分為三層水平色帶,由上而下用 teal 深淺區分:最上淺 teal #00D4FF、中間 #00B4D8、最下深藍 #0A1628 過渡,每層左側放一個簡潔小圖示(碰撞星花=意外、體溫計=疾病、輪椅=失能),圖示用單色描邊。背景大面積乾淨冷中性近白 #FDFEFE,色帶之間留大量負空間,NOT cream, NOT beige, NOT yellow-tinted。三層 teal 自然構成定錨,確保清楚可見。深藍 #0A1628 作文字。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。版面大量留白,上方與右側留標題與說明欄,可放繁中「保障 分層看更清楚」或留白,純資訊圖質感、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純觀念分層圖解,不列保額、理賠額度,不出現保險公司商標或商品名。失能以中性圖示呈現,避免恐懼訴求。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/唯一/絕對等禁字。","img":"concept-a-06.jpg"},{"id":"concept-a-07","t":"實支實付怎麼運作？三步圖解","c":"社群觀念圖卡","r":"16:9","g":["實支實付","流程圖解","三步驟"],"p":"乾淨扁平資訊圖風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。橫式版面由左到右三個圓形步驟節點,用品牌青綠 teal #00D4FF 圓圈標示,中間以深藍 #0A1628 細箭頭連接:步驟一收據小圖示、步驟二勾選核對、步驟三安心小盾牌。每個節點下方留白給簡短繁中說明文字(深藍 #0A1628)。背景大面積乾淨冷中性淺冷灰藍 #EAF0F3,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。三個圓圈與其中一個盾牌用 teal #00D4FF 與 #00B4D8 區分,確保至少兩處 teal 清楚可見。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。右側或上方留標題區大量留白,可放繁中「實支實付 三步看懂」或留白,純資訊流程圖、人物無或極少。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"流程觀念示意,不列實際理賠金額、自付額、給付比例數字,不出現保險公司商標或商品名與真實收據。文字僅放觀念說明,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/一定賠/絕對/無風險等禁字。","img":"concept-a-07.jpg"},{"id":"concept-a-08","t":"保單健診五個檢查點","c":"社群觀念圖卡","r":"4:5","g":["保單健診","檢查清單","版型圖卡"],"p":"乾淨扁平資訊圖版型風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。直式版面右側一排五個圓形勾選圖示,圓圈用品牌青綠 teal #00D4FF 描邊、勾號用深藍 #0A1628,左側放一支簡潔放大鏡作視覺定錨,放大鏡鏡框用沉穩 teal #00B4D8。每個勾選點旁留白給繁中短標題(深藍文字)。背景大面積乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。確保放大鏡與圓圈兩處以上 teal 清楚可見。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。版面上方留標題、整體大量留白,可放繁中「保單健診 五個檢查點」或留白,純清單資訊圖、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"檢查清單純觀念引導,不暗示既有保單不足以製造焦慮,不列保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/第一/唯一等禁字。","img":"concept-a-08.jpg"},{"id":"concept-a-09","t":"住院實支實付 vs 雙實支差在哪","c":"社群觀念圖卡","r":"16:9","g":["雙實支","對比圖解","自費醫材"],"p":"乾淨扁平資訊圖風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。橫式版面左右對比兩欄,左欄一個盾牌、右欄兩個疊起的盾牌示意「單」與「雙」,盾牌用品牌青綠 teal #00D4FF 與 #00B4D8 區分層次,中間一條深藍 #0A1628 細分隔線,兩欄下方各留白放簡短繁中說明(深藍文字)、搭配中性的醫材小圖示(柔和線稿、不血腥)。背景大面積乾淨冷中性淺青綠 #E3F2F4,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。確保兩欄盾牌 teal 清楚可見(至少兩處)。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。上方留標題大量留白,可放繁中「單實支 vs 雙實支」或留白,純對比資訊圖、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"對比觀念示意,不列實際理賠額度、自費金額,不出現達文西等特定商標、保險公司商標或商品名。醫材圖示中性不血腥。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對等禁字。","img":"concept-a-09.jpg"},{"id":"concept-a-10","t":"重大傷病：一次給付的意義","c":"社群觀念圖卡","r":"1:1","g":["重大傷病","一次給付","圖解觀念"],"p":"乾淨扁平資訊圖風、柔和手繪線稿、低彩度療癒,不要寫實照片、不要3D塑膠感。畫面中央一個大圓代表「一次到位的支持」,用品牌青綠 teal #00D4FF 柔填,圓外圍三個小圖示用深藍 #0A1628 細線環繞:行事曆(專心休養的時間)、一杯溫水保溫瓶(自我照顧)、攙扶的手(家人陪伴),象徵拿到支持後可以從容安排。保溫瓶用亮 teal #00D4FF、圓心用沉穩 teal #00B4D8,確保至少兩處 teal 清楚可見。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「一次給付 安心休養」或留白,扁平資訊圖風、溫暖陪伴感、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"重大傷病以溫暖休養與家人陪伴呈現,禁病床、血淋淋、孤老、留債等恐懼畫面。不列給付金額、保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對/穩賺等禁字。","img":"concept-a-10.jpg"},{"id":"concept-b-01","t":"癌症療程的自費缺口","c":"社群觀念圖卡","r":"1:1","g":["癌症自費","醫療缺口","觀念圖卡"],"p":"扁平向量資訊圖插畫，柔和手繪線稿、低彩度療癒乾淨幾何風，正方形社群觀念圖卡。畫面近白底 #FDFEFE 配大量負空間，無人物或人物極簡。中央用單一品牌青綠 teal #00D4FF 畫兩個並排的圓形容器圖示：左圓填滿 teal 標示「健保給付」，右圓只填一小角、其餘留白以細虛線框出缺口，象徵「自費部分」；缺口邊緣用亮 teal #00D4FF 細線描，深藍 #0A1628 作箭頭與所有文字。背景牆面乾淨冷中性，三選一用淺冷灰藍 #EAF0F3。至少兩處清楚 teal：左實心圓 + 右缺口虛線框。暖色嚴格 <15% 不出現大面積。上方約30%留白放繁體中文標題區。soft natural daylight, neutral-to-cool 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"合規：不放具體理賠金額、不出現保單或保險公司商標；用溫暖中性的缺口示意代替恐懼訴求，不出現病床或血淋淋畫面。文案只談觀念，不含招攬話術。若預留業務員署名，須標所屬公司全名＋業務員登錄字號。禁字：保證／節稅／一定賠／最高。","img":"concept-b-01.jpg"},{"id":"concept-b-02","t":"癌症療程像爬樓梯：一階一階的自費","c":"社群觀念圖卡","r":"4:5","g":["癌症療程","自費階梯","資訊圖"],"p":"扁平向量資訊圖，溫潤柔和手繪線稿、低彩度療癒乾淨幾何，4:5 直式社群圖卡。背景近白 #FDFEFE 與大量負空間，無寫實人物。畫面左下到右上一道由 teal #00D4FF 構成的階梯狀色塊，每一階旁用深藍 #0A1628 細字標示療程階段（檢查、療程、追蹤、生活照顧），每階高度漸增象徵自費負擔逐步累積，最高一階頂端留白象徵需提早準備。階梯陰影用深藍 #0A1628，亮 teal #00D4FF 點綴於階梯邊緣與一個小保溫瓶圖示放角落。背景大面積牆色乾淨冷中性，選柔白 #FAFCFD，明令 NOT cream NOT beige NOT yellow。暖色 <15% 不成主調。4:5 上下大量留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"合規：以中性階梯比喻自費累積，不誇大、不放具體金額、不用恐懼或病重畫面。不出現商品名／保單／保險公司商標。純觀念衛教，不含招攬。預留業務員署名時須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／一定賠。","img":"concept-b-02.jpg"},{"id":"concept-b-03","t":"失能扶助：每月有支撐的概念","c":"社群觀念圖卡","r":"1:1","g":["失能扶助","每月給付","觀念圖卡"],"p":"扁平向量插畫，柔和水彩淡塗融合幾何扁平、低彩度療癒，正方形社群觀念圖卡。背景近白 #FDFEFE 大量負空間，可放一位當代台灣東亞臉孔長者半身極簡剪影（花白短髮、自然健康膚色、內雙、台灣日常素色開襟衫 teal #00B4D8），溫暖陪伴感但不悲情。畫面用一排 teal #00D4FF 的等距日曆格子或月份圓點橫向延伸，象徵「每月持續給付」的節奏，每格內一個小盾形圖示，深藍 #0A1628 作文字與細線。亮 teal #00D4FF 用於月份圓點與長者衣領鈕扣兩處。背景牆乾淨冷中性，選淺青綠 #E3F2F4，NOT cream NOT beige NOT yellow。暖色 <15%。上方30%留白放繁中標題。soft natural cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"合規：失能議題以溫暖陪伴呈現，禁孤老／病床／留債等恐懼畫面。不放具體每月給付金額、不出現保單或商標。月份節奏僅示意「持續性」觀念，不承諾理賠。預留署名須標所屬公司全名＋業務員登錄字號。禁字：保證／一定賠／最高。","img":"concept-b-03.jpg"},{"id":"concept-b-04","t":"定期 vs 終身：兩種陪伴方式","c":"社群觀念圖卡","r":"16:9","g":["定期終身","對比圖","觀念圖卡"],"p":"扁平向量資訊圖，乾淨幾何扁平、柔和手繪線稿、低彩度，16:9 橫式社群觀念圖卡，左右對比版型。背景近白 #FDFEFE 大量負空間、無寫實人物。畫面中央一條 teal #00D4FF 細直線分成左右兩欄：左欄「定期」用一段較短的 teal #00D4FF 水平時間軸條，端點清楚收束；右欄「終身」用一段延伸到邊緣的較長 teal 時間軸條。各欄上方一個對應的傘形或屋形扁平圖示，深藍 #0A1628 作標題與重點短句。亮 teal #00D4FF 用於兩條時間軸與中央分隔線端點，至少兩處。背景牆乾淨冷中性，選淺冷灰藍 #EAF0F3，NOT cream NOT beige NOT yellow。暖色 <15% 不成主調。右側留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"合規：純觀念比較，中立呈現兩種型態的差異，不暗示何者必較好、不誇大、不放保額金額。不出現商品名／保單／保險公司商標。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／第一／唯一／一定賠。","img":"concept-b-04.jpg"},{"id":"concept-b-05","t":"保額怎麼配才合身","c":"社群觀念圖卡","r":"1:1","g":["保額適配","量身概念","觀念圖卡"],"p":"扁平向量插畫，柔和手繪線稿、乾淨幾何扁平、低彩度療癒，正方形社群觀念圖卡。背景近白 #FDFEFE 與大量負空間。畫面中央一件以 teal #00D4FF 線條勾勒的合身外套輪廓，旁邊一把 teal 量尺與三段刻度，象徵「依需求量身配置保額」的觀念，深藍 #0A1628 作刻度數字與標題短句（以相對比例呈現，不寫具體金額）。亮 teal #00D4FF 用於量尺刻度與外套鈕扣兩處清楚可見。可在角落放一盆台灣常見蝴蝶蘭或發財樹扁平小圖點生活感。背景牆乾淨冷中性，選柔白 #FAFCFD，NOT cream NOT beige NOT yellow，大面積留白禁奶油黃。暖色 <15%。上方30%留白放繁中標題。soft natura al-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何，溫暖中性口吻不用恐懼訴求，台灣社群衛教圖卡。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"說明兩種給付可互補的觀念，不強調保證效果。禁用一定/最高/保證等字；不放金額、不出現保險公司商標或商品名，提醒依個人需求與條款評估。署名須標所屬公司全名＋業務員登錄字號。","img":"concept-c-07.jpg"},{"id":"concept-c-08","t":"保費別超過收入雙十","c":"社群觀念圖卡","r":"1:1","g":["雙十原則","保費比例","圓餅圖"],"p":"乾淨扁平向量資訊圖觀念卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D塑膠感。畫面中央一個簡約扁平圓餅圖，象徵「保費約佔年收入一成」：主體大扇形用淺冷灰 teal 線稿留白，約10%的小扇形用亮 teal #00D4FF 明顯標出，圓餅外圈與引線用沉穩 teal #00B4D8，深藍 #0A1628 作百分比與標籤文字。背景一律乾淨冷中性，採柔白 #FAFCFD 大面積負空間，NOT cream, NOT beige, NOT yellow-tinted。上方約30%留白放繁體中文標題。teal 至少兩處清楚可見（小扇形＋外圈）。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖，台灣社群理財衛教圖卡質感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"雙十原則為理財參考觀念非投保承諾。禁用一定/保證/最高等字；比例僅作教育示意、不對應特定商品或保額，不出現保險公司商標。提醒依個人財務狀況調整。署名須標所屬公司全名＋業務員登錄字號。","img":"concept-c-08.jpg"},{"id":"concept-c-09","t":"保額抓收入十倍的概念","c":"社群觀念圖卡","r":"4:5","g":["雙十原則","保額觀念","長條圖"],"p":"溫潤扁平向量資訊圖觀念卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面是一根矮的「年收入」短柱與一根高的「保額參考」長柱並排，象徵雙十原則保額約為年收入十倍的概念：短柱用沉穩 teal #00B4D8，長柱用亮 teal #00D4FF 並以分段堆疊呈現十倍刻度，深藍 #0A1628 作刻度線、倍數標籤與文字。背景採淺冷灰藍 #EAF0F3 乾淨冷中性大面積留白，NOT cream, NOT beige, NOT yellow-tinted，大面積留白禁止奶油黃。4:5版型大量留白集中上方放繁體中文主標。teal 兩柱各一處清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"雙十原則保額為理財參考觀念，倍數僅作示意非保證或承諾。禁用一定/保證/最高等字；不出現具體保額金額對應商品、不放保險公司商標。提醒依個人需求與負擔能力評估。署名須標所屬公司全名＋業務員登錄字號。","img":"concept-c-09.jpg"},{"id":"concept-c-10","t":"三步驟檢視你的保費比例","c":"社群觀念圖卡","r":"16:9","g":["雙十原則","三步驟","流程圖"],"p":"扁平向量流程資訊圖橫式圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面為由左到右的三步驟流程：第一步算盤／計算機小圖示、第二步圓餅比例小圖示、第三步打勾清單小圖示，三者用扁平圓形節點＋連接箭頭串接。圓形節點交替用亮 teal #00D4FF 與沉穩 teal #00B4D8，連接箭頭、步驟編號（1/2/3）與說明文字用深藍 #0A1628。背景採柔白 #FAFCFD 乾淨冷中性，NOT cream, NOT beige, NOT yellow-tinted。16:9版型留白集中上方放繁體中文主標、下方放三步驟短說明。teal 至少兩個節點清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風，台灣社群理財衛教圖卡。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"提供自我檢視保費比例的步驟觀念，非投保承諾。禁用一定/保證/最高/穩賺等字；不放金額、不對應特定商品、不出現保險公司商標。提醒依個人財務狀況調整。署名須標所屬公司全名＋業務員登錄字號。","img":"concept-c-10.jpg"},{"id":"infographic-a-01","t":"人生五階段保障時間軸","c":"觀念圖解資訊圖","r":"16:9","g":["時間軸","人生階段","資訊圖"],"p":"乾淨扁平向量資訊圖,柔和手繪線稿、低彩度療癒風,大量負空間。畫面是一條由左至右的水平時間軸,代表人生五個階段(社會新鮮人、成家、育兒、事業高峰、退休樂活),每階段一個簡潔幾何圖示(背包、雙人小屋、嬰兒車、辦公桌、公園長椅)與一個小小的當代台灣東亞臉孔頭像剪影(黑髮或花白短髮、自然健康膚色、單眼皮、台灣日常穿著)。背景牆面一律乾淨冷中性柔白 #FAFCFD,大面積留白,NOT cream NOT beige NOT yellow-tinted。時間軸主線與五個節點圓形用品牌青綠 teal,主線用沉穩 #00B4D8、節點圓與小圖示用亮 teal #00D4FF(全圖至少兩處清楚可見),所有文字與最深陰影用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方留約 25% 純色空間放繁體中文標題「人生五階段 保障時間軸」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純觀念圖解,不放具體保額/理賠金額,不出現保險公司商標或商品名。文字僅作觀念說明,不含招攬話術與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。退休階段以樂活陪伴呈現,不用孤老/病床等恐懼訴求。","img":"infographic-a-01.jpg"},{"id":"infographic-a-02","t":"保障缺口階梯圖","c":"觀念圖解資訊圖","r":"16:9","g":["階梯圖","保障缺口","層次"],"p":"乾淨扁平向量資訊圖,療癒低彩度、柔和手繪線稿,大量負空間。畫面中央是一組由低到高的五階階梯,每一階標示一個保障層次(基本醫療、收入保障、子女教育、退休準備、資產傳承),最高一階與虛線勾勒出的「理想保障」之間留一道可見的缺口(以淺色虛線方框與向上箭頭暗示)。背景一律乾淨冷中性淺冷灰藍 #EAF0F3,大面積留白,NOT cream NOT beige NOT yellow-tinted。階梯實體填色用品牌青綠 teal——下半用沉穩 #00B4D8、頂階與向上箭頭用亮 teal #00D4FF(至少兩處清楚可見);缺口虛線與所有文字用深藍 #0A1628。零暖色。可放一個極簡當代台灣風的小人物剪影(黑髮短髮、台灣日常穿著)站在某一階上仰望上方,人物比例小、可有可無。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。一側留白放繁體中文標題「你的保障缺口在哪一階?」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"缺口為觀念示意,不放具體金額數字,不出現保單/保額/理賠金。文字不含恐懼訴求與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險),以正向「逐階補強」概念呈現,不暗示不買就會出事。","img":"infographic-a-02.jpg"},{"id":"infographic-a-03","t":"家庭責任金字塔","c":"觀念圖解資訊圖","r":"4:5","g":["金字塔","家庭責任","層次圖"],"p":"乾淨扁平向量資訊圖,柔和手繪線稿、低彩度療癒風,大量留白。畫面中央是一座分四層的金字塔,由下而上代表家庭責任層次(基礎生活開銷、房貸與負債、子女教養、長期照顧與晚年陪伴),每層配一個簡潔幾何圖示(餐桌碗筷、台式公寓小屋含鋁窗鐵窗花、書本鉛筆、相牽的手)。背景牆面乾淨冷中性淺青綠 #E3F2F4,大面積負空間,NOT cream NOT beige NOT yellow-tinted。金字塔四層填色由深到淺的品牌青綠 teal——底層沉穩 #00B4D8、上層亮 teal #00D4FF(至少兩處清楚可見);分隔線、圖示描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方與下方留大量空白放繁體中文標題「家庭責任金字塔」與小字層次說明。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"純觀念示意圖,不放任何金額/保額/理賠數字,不出現保單或保險公司商標。長期照顧層以「相牽的手」溫暖呈現,禁病床/血淋淋/孤老畫面。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。","img":"infographic-a-03.jpg"},{"id":"infographic-a-04","t":"雙薪家庭風險地圖","c":"觀念圖解資訊圖","r":"16:9","g":["風險地圖","雙薪家庭","資訊圖"],"p":"乾淨扁平向量資訊圖,療癒低彩度、柔和幾何扁平風,大量負空間。畫面是一張簡化的「家庭風險地圖」,中央一個台式雙薪家庭小屋(含鋁窗、不鏽鋼鐵窗花),四周以細線連到四個風險區塊節點:其中一位收入中斷、醫療支出、子女教育期、退休準備期,每個節點一個極簡幾何圖示(暫停符號、十字醫療符號、書本、沙漏)。屋內有兩個小小的當代台灣東亞臉孔剪影(黑髮短髮、自然健康膚色、台灣日常穿著)。背景一律乾淨冷中性柔白 #FAFCFD,大面積留白,NOT cream NOT beige NOT yellow-tinted。連線與四個節點圓用品牌青綠 teal,主連線沉穩 #00B4D8、節點與圖示亮 teal #00D4FF(至少兩處清楚可見);屋體描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。一側留白放繁體中文標題「雙薪家庭風險地圖」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"風險以中性圖示示意,不放具體金額/保額,不出現保單或保險公司商標。收入中斷以「暫停符號」中性呈現,不用恐懼訴求。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。","img":"infographic-a-04.jpg"},{"id":"infographic-a-05","t":"人生五階段保障重點對照卡","c":"觀念圖解資訊圖","r":"16:9","g":["對照卡","人生階段","版型"],"p":"乾淨扁平向量資訊圖、療癒低彩度、柔和手繪線稿,大量留白。畫面是五張並排的縱向資訊卡,對應人生五階段(單身、新婚、育兒、空巢、退休),每張卡上方一個簡潔幾何圖示與一個極簡當代台灣東亞臉孔頭像(黑髮或花白短髮、自然健康膚色、單眼皮、台灣日常穿著),下方留三條留白橫線示意保障重點(不填具體數字)。背景牆面乾淨冷中性淺冷灰藍 #EAF0F3,卡片底為近白 #FDFEFE,卡與卡之間大量負空間,NOT cream NOT beige NOT yellow-tinted。卡片頂部色條與圖示用品牌青綠 teal——沉穩 #00B4D8 與亮 teal #00D4FF 交替(至少兩處清楚可見);卡片描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方留約 25% 空白放繁體中文標題「五階段保障重點對照」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.","n":"對照卡僅作觀念對照,留白橫線不填金額/保額/理賠數字,不出現保單或保險公司商標。退休階段以樂活呈現,不用孤老/病床。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。","img":"infographic-a-05.jpg"},{"id":"infographic-a-06","t":"保障缺口三層補強圖","c":"觀念圖解資訊圖","r":"1:1","g":["保障缺口","同心圓","社群卡"],"p":"乾淨扁平向量資訊圖,低彩度療癒、柔和幾何扁平風,大量負空間。畫面中央三個由小到大的同心半圓弧層,由內而外代表三層保障補強(現有保障、補強規劃、理想目標),最外弧與虛線勾勒的目標線之間留一道可見缺口,以淺色虛線弧與向外小箭頭示意。背景一律乾淨冷中性淺青綠 #E3F2F4,四周大面積留白,NOT cream NOT beige NOT yellow-tinted。三層弧填色由深到淺的品牌青綠 teal——內層沉穩 #00B4D8、外層亮 teal #00D4FF(至少兩處清楚可見);虛線缺口與所有文字標籤用深藍 #0A1628。零暖色, // chips

function filtered(){return DATA.filter(d=>(cur==='all'||d.c===cur)&&(!q||(d.t+d.c+d.g.join('')).toLowerCase().includes(q)));}
function card(d){
 const media=d.img?'<img loading="lazy" src="tw/imgs/'+d.img+'">':'<div class="ph">🎨 圖片生成中<br>點我看提示詞</div>';

 const win=[];const add=n=>win.push(n);
 if(pages<=9){for(let i=1;i<=pages;i++)add(i);}
 else{add(1);let s=Math.max(2,page-2),e=Math.min(pages-1,page+2);if(s>2)win.push('...');for(let i=s;i<=e;i++)add(i);if(e<pages-1)win.push('...');add(pages);}
 h+=win.map(n=>n==='...'?'<span class="pgInfo">…</span>':'<button class="pg'+(n===page?' on':'')+'" data-p="'+n+'">'+n+'</button>').join('');
 h+='<button class="pg nav" '+(page>=pages?'disabled':'')+' data-p="'+(page+1)+'">下一頁 ›</button>';
 h+='<div class="pgInfo">第 '+page+' / '+pages+' 頁・共 '+total+' 張</div>';
 $('#pager').innerHTML=h;
 [...document.querySelectorAll('.pg')].forEach(b=>{if(!b.disabled)b.onclick=()=>{page=+b.dataset.p;render();window.scrollTo({top:0,behavior:'smooth'});};});
}
function openModal(id){
 const d=DATA.find(x=>x.id===id);if(!d)return;
 const media=d.img?'<img class="mImg" src="tw/imgs/'+d.img+'">':'<div class="mPh">🎨 此張示意圖生成中<br><span style="font-size:13px;font-weight:400">下方提示詞可直接複製去 ChatGPT / Gemini 生圖</span></div>';
 $('#modal').innerHTML=media+'<div class="mBody"><span class="mCat">'+esc(d.c)+' ・ '+esc(d.r)+'</span><div class="mTi">'+esc(d.t)+'</div>'+
  '<div class="mTags">'+d.g.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>'+
  '<div class="mLbl">完整提示詞</div><div class="mPr">'+esc(d.p)+'</div>'+
  '<button class="mCopy" id="mcopy">📋 複製提示詞</button>'+
  '<div class="mNote">⚠️ '+esc(d.n)+'</div></div>';
 $('#mcopy').onclick=()=>{navigator.clipboard.writeText(d.p);const b=$('#mcopy');b.textContent='✓ 已複製，貼到 ChatGPT/Gemini 就能生圖';b.classList.add('ok');setTimeout(()=>{b.textContent='📋 複製提示詞';b.classList.remove('ok');},1800);};
 $('#ov').classList.add('on');document.body.style.overflow='hidden';
}
function closeModal(){$('#ov').classList.remove('on');document.body.style.overflow='';}
$('#xbtn').onclick=closeModal;
$('#ov').onclick=e=>{if(e.target.id==='ov')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script></body></html>
