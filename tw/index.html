], "p": "溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面中央一張交織的網子(像安全網),網繩用品牌青綠 teal #00D4FF 線條清楚編織,網子上方有幾個往下掉落的小圖示:藥袋、聽診器、點滴小瓶,被網子穩穩接住。網子兩端用深藍 #0A1628 固定點。背景牆面乾淨冷中性淺冷灰藍 #EAF0F3,大量留白,NOT cream, NOT beige, NOT yellow-tinted。網子接住的其中一個小物與一處固定釦用沉穩 teal #00B4D8,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%負空間留標題,可放繁中「醫療費用 有網接住」或留白,扁平資訊圖質感、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "觀念示意,不列實際理賠額度、自付額數字,不出現保險公司商標或商品名。安全網比喻僅作保障觀念,避免恐懼訴求。文字僅放觀念,不含招攬用語。預留署名須標公司全名＋業務員登錄字號。避用保證/一定賠/絕對/無風險等禁字。", "img": "concept-a-02.jpg"}, {"id": "concept-a-03", "t": "保單健診，用放大鏡看清楚", "c": "社群觀念圖卡", "r": "1:1", "g": ["保單健診", "放大鏡", "檢視觀念"], "p": "溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面主角為一支放大鏡,鏡框用品牌青綠 teal #00D4FF 清楚描繪,放大鏡下方有一份簡化的文件示意圖(只用幾條深藍 #0A1628 橫線代表條列,不出現任何品牌名或真實保單),放大鏡聚焦處用淡淡 teal 圈出一個打勾的小圓圈。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。放大鏡握把與聚焦圈用沉穩 teal #00B4D8,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「保單健診 看清楚再安心」或留白,扁平資訊圖風、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "文件純示意,不顯示任何保險公司商標、商品名或真實保單內容。健診觀念中性呈現,不暗示原有保單不足以製造焦慮。不放保額數字。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/唯一等禁字。", "img": "concept-a-03.jpg"}, {"id": "concept-a-04", "t": "雙實支，自費醫材也安心", "c": "社群觀念圖卡", "r": "1:1", "g": ["雙實支", "自費醫材", "達文西手術觀念"], "p": "溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面用兩層疊起的圓形盾牌示意「雙重」概念,兩個盾牌都用品牌青綠 teal(外層 #00B4D8、內層 #00D4FF)清楚區分,盾牌前方放一個簡潔的醫療器材小圖示(中性的手術器械或人工關節剪影,線條柔和、不血腥),用深藍 #0A1628 描邊。背景牆面乾淨冷中性淺青綠 #E3F2F4,大量留白,NOT cream, NOT beige, NOT yellow-tinted。確保兩層 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%負空間留標題,可放繁中「自費醫材 多一層準備」或留白,扁平資訊圖風、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "觀念示意,不出現達文西/特定機器商標或商品名,不列自費金額、理賠額度。醫材圖示中性不血腥,避免恐懼訴求。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對等禁字。", "img": "concept-a-04.jpg"}, {"id": "concept-a-05", "t": "重大傷病，一次給付一份從容", "c": "社群觀念圖卡", "r": "1:1", "g": ["重大傷病", "一次給付", "從容觀念"], "p": "溫潤扁平向量插畫風、柔和手繪線稿、低彩度療癒乾淨幾何風,不要寫實照片、不要3D塑膠感。畫面中央一個被雙手溫柔捧住的圓形(象徵一次到位的支持),圓形用品牌青綠 teal #00D4FF 漸柔填色,雙手線條用深藍 #0A1628 柔和描繪,圓形旁邊一個小小的勾選標記表示「一次到位」。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。捧著的手腕處薄毯或袖口用沉穩 teal #00B4D8 點綴,確保全畫至少兩處 teal 清楚可見。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「一次給付 多一份從容」或留白,扁平資訊圖風、零大面積暖色、溫暖陪伴感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "重大傷病以溫暖陪伴呈現,禁病床、血淋淋、孤老、留債等恐懼畫面。不列給付金額、保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對/穩賺等禁字。", "img": "concept-a-05.jpg"}, {"id": "concept-a-06", "t": "意外、疾病、失能，分層看保障", "c": "社群觀念圖卡", "r": "4:5", "g": ["保障分層", "三層圖解", "版型留白"], "p": "乾淨扁平資訊圖版型風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。直式版面分為三層水平色帶,由上而下用 teal 深淺區分:最上淺 teal #00D4FF、中間 #00B4D8、最下深藍 #0A1628 過渡,每層左側放一個簡潔小圖示(碰撞星花=意外、體溫計=疾病、輪椅=失能),圖示用單色描邊。背景大面積乾淨冷中性近白 #FDFEFE,色帶之間留大量負空間,NOT cream, NOT beige, NOT yellow-tinted。三層 teal 自然構成定錨,確保清楚可見。深藍 #0A1628 作文字。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。版面大量留白,上方與右側留標題與說明欄,可放繁中「保障 分層看更清楚」或留白,純資訊圖質感、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念分層圖解,不列保額、理賠額度,不出現保險公司商標或商品名。失能以中性圖示呈現,避免恐懼訴求。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/唯一/絕對等禁字。", "img": "concept-a-06.jpg"}, {"id": "concept-a-07", "t": "實支實付怎麼運作？三步圖解", "c": "社群觀念圖卡", "r": "16:9", "g": ["實支實付", "流程圖解", "三步驟"], "p": "乾淨扁平資訊圖風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。橫式版面由左到右三個圓形步驟節點,用品牌青綠 teal #00D4FF 圓圈標示,中間以深藍 #0A1628 細箭頭連接:步驟一收據小圖示、步驟二勾選核對、步驟三安心小盾牌。每個節點下方留白給簡短繁中說明文字(深藍 #0A1628)。背景大面積乾淨冷中性淺冷灰藍 #EAF0F3,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。三個圓圈與其中一個盾牌用 teal #00D4FF 與 #00B4D8 區分,確保至少兩處 teal 清楚可見。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。右側或上方留標題區大量留白,可放繁中「實支實付 三步看懂」或留白,純資訊流程圖、人物無或極少。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "流程觀念示意,不列實際理賠金額、自付額、給付比例數字,不出現保險公司商標或商品名與真實收據。文字僅放觀念說明,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/一定賠/絕對/無風險等禁字。", "img": "concept-a-07.jpg"}, {"id": "concept-a-08", "t": "保單健診五個檢查點", "c": "社群觀念圖卡", "r": "4:5", "g": ["保單健診", "檢查清單", "版型圖卡"], "p": "乾淨扁平資訊圖版型風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。直式版面右側一排五個圓形勾選圖示,圓圈用品牌青綠 teal #00D4FF 描邊、勾號用深藍 #0A1628,左側放一支簡潔放大鏡作視覺定錨,放大鏡鏡框用沉穩 teal #00B4D8。每個勾選點旁留白給繁中短標題(深藍文字)。背景大面積乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。確保放大鏡與圓圈兩處以上 teal 清楚可見。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。版面上方留標題、整體大量留白,可放繁中「保單健診 五個檢查點」或留白,純清單資訊圖、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "檢查清單純觀念引導,不暗示既有保單不足以製造焦慮,不列保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/第一/唯一等禁字。", "img": "concept-a-08.jpg"}, {"id": "concept-a-09", "t": "住院實支實付 vs 雙實支差在哪", "c": "社群觀念圖卡", "r": "16:9", "g": ["雙實支", "對比圖解", "自費醫材"], "p": "乾淨扁平資訊圖風、柔和手繪線稿、低彩度,不要寫實照片、不要3D塑膠感。橫式版面左右對比兩欄,左欄一個盾牌、右欄兩個疊起的盾牌示意「單」與「雙」,盾牌用品牌青綠 teal #00D4FF 與 #00B4D8 區分層次,中間一條深藍 #0A1628 細分隔線,兩欄下方各留白放簡短繁中說明(深藍文字)、搭配中性的醫材小圖示(柔和線稿、不血腥)。背景大面積乾淨冷中性淺青綠 #E3F2F4,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。確保兩欄盾牌 teal 清楚可見(至少兩處)。零暖色,暖色僅極小面積點綴低於15%。光線 neutral-to-cool 約5200K, no warm yellow cast。上方留標題大量留白,可放繁中「單實支 vs 雙實支」或留白,純對比資訊圖、人物無。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "對比觀念示意,不列實際理賠額度、自費金額,不出現達文西等特定商標、保險公司商標或商品名。醫材圖示中性不血腥。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對等禁字。", "img": "concept-a-09.jpg"}, {"id": "concept-a-10", "t": "重大傷病：一次給付的意義", "c": "社群觀念圖卡", "r": "1:1", "g": ["重大傷病", "一次給付", "圖解觀念"], "p": "乾淨扁平資訊圖風、柔和手繪線稿、低彩度療癒,不要寫實照片、不要3D塑膠感。畫面中央一個大圓代表「一次到位的支持」,用品牌青綠 teal #00D4FF 柔填,圓外圍三個小圖示用深藍 #0A1628 細線環繞:行事曆(專心休養的時間)、一杯溫水保溫瓶(自我照顧)、攙扶的手(家人陪伴),象徵拿到支持後可以從容安排。保溫瓶用亮 teal #00D4FF、圓心用沉穩 teal #00B4D8,確保至少兩處 teal 清楚可見。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間,NOT cream, NOT beige, NOT yellow-tinted。深藍 #0A1628 作文字與最深陰影。暖色僅極小面積點綴低於15%。光線 soft natural daylight, neutral-to-cool 約5200K, no warm yellow cast。上方約30%留白給標題,可放繁中「一次給付 安心休養」或留白,扁平資訊圖風、溫暖陪伴感、零大面積暖色。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "重大傷病以溫暖休養與家人陪伴呈現,禁病床、血淋淋、孤老、留債等恐懼畫面。不列給付金額、保額數字,不出現保險公司商標或商品名。文字僅放觀念,不含招攬。預留署名須標公司全名＋業務員登錄字號。避用保證/最高/一定賠/絕對/穩賺等禁字。", "img": "concept-a-10.jpg"}, {"id": "concept-b-01", "t": "癌症療程的自費缺口", "c": "社群觀念圖卡", "r": "1:1", "g": ["癌症自費", "醫療缺口", "觀念圖卡"], "p": "扁平向量資訊圖插畫，柔和手繪線稿、低彩度療癒乾淨幾何風，正方形社群觀念圖卡。畫面近白底 #FDFEFE 配大量負空間，無人物或人物極簡。中央用單一品牌青綠 teal #00D4FF 畫兩個並排的圓形容器圖示：左圓填滿 teal 標示「健保給付」，右圓只填一小角、其餘留白以細虛線框出缺口，象徵「自費部分」；缺口邊緣用亮 teal #00D4FF 細線描，深藍 #0A1628 作箭頭與所有文字。背景牆面乾淨冷中性，三選一用淺冷灰藍 #EAF0F3。至少兩處清楚 teal：左實心圓 + 右缺口虛線框。暖色嚴格 <15% 不出現大面積。上方約30%留白放繁體中文標題區。soft natural daylight, neutral-to-cool 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：不放具體理賠金額、不出現保單或保險公司商標；用溫暖中性的缺口示意代替恐懼訴求，不出現病床或血淋淋畫面。文案只談觀念，不含招攬話術。若預留業務員署名，須標所屬公司全名＋業務員登錄字號。禁字：保證／節稅／一定賠／最高。", "img": "concept-b-01.jpg"}, {"id": "concept-b-02", "t": "癌症療程像爬樓梯：一階一階的自費", "c": "社群觀念圖卡", "r": "4:5", "g": ["癌症療程", "自費階梯", "資訊圖"], "p": "扁平向量資訊圖，溫潤柔和手繪線稿、低彩度療癒乾淨幾何，4:5 直式社群圖卡。背景近白 #FDFEFE 與大量負空間，無寫實人物。畫面左下到右上一道由 teal #00D4FF 構成的階梯狀色塊，每一階旁用深藍 #0A1628 細字標示療程階段（檢查、療程、追蹤、生活照顧），每階高度漸增象徵自費負擔逐步累積，最高一階頂端留白象徵需提早準備。階梯陰影用深藍 #0A1628，亮 teal #00D4FF 點綴於階梯邊緣與一個小保溫瓶圖示放角落。背景大面積牆色乾淨冷中性，選柔白 #FAFCFD，明令 NOT cream NOT beige NOT yellow。暖色 <15% 不成主調。4:5 上下大量留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：以中性階梯比喻自費累積，不誇大、不放具體金額、不用恐懼或病重畫面。不出現商品名／保單／保險公司商標。純觀念衛教，不含招攬。預留業務員署名時須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／一定賠。", "img": "concept-b-02.jpg"}, {"id": "concept-b-03", "t": "失能扶助：每月有支撐的概念", "c": "社群觀念圖卡", "r": "1:1", "g": ["失能扶助", "每月給付", "觀念圖卡"], "p": "扁平向量插畫，柔和水彩淡塗融合幾何扁平、低彩度療癒，正方形社群觀念圖卡。背景近白 #FDFEFE 大量負空間，可放一位當代台灣東亞臉孔長者半身極簡剪影（花白短髮、自然健康膚色、內雙、台灣日常素色開襟衫 teal #00B4D8），溫暖陪伴感但不悲情。畫面用一排 teal #00D4FF 的等距日曆格子或月份圓點橫向延伸，象徵「每月持續給付」的節奏，每格內一個小盾形圖示，深藍 #0A1628 作文字與細線。亮 teal #00D4FF 用於月份圓點與長者衣領鈕扣兩處。背景牆乾淨冷中性，選淺青綠 #E3F2F4，NOT cream NOT beige NOT yellow。暖色 <15%。上方30%留白放繁中標題。soft natural cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：失能議題以溫暖陪伴呈現，禁孤老／病床／留債等恐懼畫面。不放具體每月給付金額、不出現保單或商標。月份節奏僅示意「持續性」觀念，不承諾理賠。預留署名須標所屬公司全名＋業務員登錄字號。禁字：保證／一定賠／最高。", "img": "concept-b-03.jpg"}, {"id": "concept-b-04", "t": "定期 vs 終身：兩種陪伴方式", "c": "社群觀念圖卡", "r": "16:9", "g": ["定期終身", "對比圖", "觀念圖卡"], "p": "扁平向量資訊圖，乾淨幾何扁平、柔和手繪線稿、低彩度，16:9 橫式社群觀念圖卡，左右對比版型。背景近白 #FDFEFE 大量負空間、無寫實人物。畫面中央一條 teal #00D4FF 細直線分成左右兩欄：左欄「定期」用一段較短的 teal #00D4FF 水平時間軸條，端點清楚收束；右欄「終身」用一段延伸到邊緣的較長 teal 時間軸條。各欄上方一個對應的傘形或屋形扁平圖示，深藍 #0A1628 作標題與重點短句。亮 teal #00D4FF 用於兩條時間軸與中央分隔線端點，至少兩處。背景牆乾淨冷中性，選淺冷灰藍 #EAF0F3，NOT cream NOT beige NOT yellow。暖色 <15% 不成主調。右側留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：純觀念比較，中立呈現兩種型態的差異，不暗示何者必較好、不誇大、不放保額金額。不出現商品名／保單／保險公司商標。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／第一／唯一／一定賠。", "img": "concept-b-04.jpg"}, {"id": "concept-b-05", "t": "保額怎麼配才合身", "c": "社群觀念圖卡", "r": "1:1", "g": ["保額適配", "量身概念", "觀念圖卡"], "p": "扁平向量插畫，柔和手繪線稿、乾淨幾何扁平、低彩度療癒，正方形社群觀念圖卡。背景近白 #FDFEFE 與大量負空間。畫面中央一件以 teal #00D4FF 線條勾勒的合身外套輪廓，旁邊一把 teal 量尺與三段刻度，象徵「依需求量身配置保額」的觀念，深藍 #0A1628 作刻度數字與標題短句（以相對比例呈現，不寫具體金額）。亮 teal #00D4FF 用於量尺刻度與外套鈕扣兩處清楚可見。可在角落放一盆台灣常見蝴蝶蘭或發財樹扁平小圖點生活感。背景牆乾淨冷中性，選柔白 #FAFCFD，NOT cream NOT beige NOT ye storted hands/faces.", "n": "合規：以雙防線比喻先備現金再談保障的觀念，中性衛教不誇大、不放金額。不出現保單／商品名／保險公司商標、不用恐懼訴求。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／無風險／一定賠／最高。", "img": "concept-b-07.jpg"}, {"id": "concept-b-08", "t": "失能扶助：補上每月的收入缺口", "c": "社群觀念圖卡", "r": "4:5", "g": ["失能扶助", "收入缺口", "資訊圖"], "p": "扁平向量資訊圖，乾淨幾何扁平、柔和線稿、低彩度療癒，4:5 直式社群觀念圖卡。背景近白 #FDFEFE 大量負空間、無寫實人物。畫面用兩條垂直長條對比：左條 teal #00D4FF 飽滿標「原本的每月收入」，右條只剩下半截、上半以細虛線框出空缺標「失能後的缺口」，中間用一個 teal #00D4FF 補丁方塊往上填補空缺象徵「失能扶助補上缺口」。深藍 #0A1628 作所有文字與箭頭。亮 teal #00D4FF 用於補丁方塊與左條頂端兩處。背景牆乾淨冷中性，選柔白 #FAFCFD，大面積留白禁奶油黃，NOT cream NOT beige NOT yellow。暖色 <15%。4:5 上下大量留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：以中性長條圖示意收入缺口與補位觀念，禁病床／孤老等恐懼畫面，不放具體給付金額、不承諾固定理賠。不出現保單／商品名／保險公司商標。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／一定賠／最高／穩賺。", "img": "concept-b-08.jpg"}, {"id": "concept-b-09", "t": "終身保障像長備傘，定期像借傘", "c": "社群觀念圖卡", "r": "1:1", "g": ["定期終身", "雨傘比喻", "觀念圖卡"], "p": "扁平向量插畫，柔和手繪線稿、乾淨幾何扁平、低彩度療癒，正方形社群觀念圖卡。背景近白 #FDFEFE 大量負空間。畫面左右各一把 teal #00D4FF 線條雨傘：左傘下標「定期：在約定的期間內撐傘」、右傘下標「終身：陪你一路撐到老」，兩傘下各一個極簡台灣東亞臉孔小人剪影（黑髮、自然膚色、台灣日常素色上衣 teal #00B4D8）。深藍 #0A1628 作標題與雨點細線。亮 teal #00D4FF 用於兩把傘骨與一處雨滴聚集兩處清楚。背景牆乾淨冷中性，選淺青綠 #E3F2F4，NOT cream NOT beige NOT yellow。暖色 <15% 不成主調。上方30%留白放繁中標題。soft natural cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：雨傘比喻定期與終身的保障期間，中立不偏向、不誇大、不放金額。不出現保單／商品名／保險公司商標。純觀念，不含招攬承諾。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／唯一／第一／一定賠。", "img": "concept-b-09.jpg"}, {"id": "concept-b-10", "t": "三步驟：先盤點，再配保額", "c": "社群觀念圖卡", "r": "4:5", "g": ["保額適配", "三步驟", "流程圖"], "p": "扁平向量流程資訊圖，乾淨幾何扁平、柔和線稿、低彩度，4:5 直式社群觀念圖卡。背景近白 #FDFEFE 大量負空間、無寫實人物。畫面由上而下三個 teal #00D4FF 圓形節點以細直線串連成流程：1 盤點家庭責任、2 算出收入支出缺口、3 配置合身保額，每個節點配一個對應扁平小圖（家屋／天平／合身外套），深藍 #0A1628 作編號與步驟文字。亮 teal #00D4FF 用於三個節點圓與連接線端點，至少兩處清楚。背景牆乾淨冷中性，選淺冷灰藍 #EAF0F3，NOT cream NOT beige NOT yellow，大面積留白禁奶油黃。暖色 <15% 不成主調。4:5 上下與右側大量留白放繁中標題。soft cool daylight 5200K。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "合規：流程僅示意保額規劃觀念步驟，不放具體金額、不暗示固定數字最佳、不承諾理賠。不出現保單／商品名／保險公司商標。純衛教引導不含招攬。預留業務員署名須標所屬公司全名＋業務員登錄字號。禁字：保證／最高／唯一／一定賠。", "img": "concept-b-10.jpg"}, {"id": "concept-c-01", "t": "通膨悄悄縮水你的保障", "c": "社群觀念圖卡", "r": "1:1", "g": ["通膨", "購買力", "觀念圖解"], "p": "乾淨扁平向量資訊圖插畫，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D塑膠感。畫面主視覺是一支水彩淡塗的冰淇淋甜筒造型，象徵「同樣的保障，逐年融化縮水」：上方完整的圓球用品牌青綠 teal #00D4FF，往下逐漸縮小成小球，旁邊一條由左到右遞減的扁平長條圖以沉穩 teal #00B4D8 漸層表示購買力下降，深藍 #0A1628 作箭頭與細標籤文字。背景一律乾淨冷中性，採柔白 #FAFCFD 大面積負空間，NOT cream, NOT beige, NOT yellow-tinted。上方約30%大量留白放繁體中文標題區。teal 至少兩處清楚可見（冰淇淋球+長條圖）。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。整體乾淨幾何、零暖色，台灣社群圖卡質感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念教育圖卡。禁用保證/最高/穩賺等字眼；不出現保額理賠金額、保險公司商標、商品名。若預留業務員署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-01.jpg"}, {"id": "concept-c-02", "t": "保障也要跟著物價長大", "c": "社群觀念圖卡", "r": "4:5", "g": ["通膨", "定期檢視", "扁平插畫"], "p": "溫潤扁平向量觀念圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面是一棵簡約的盆栽小樹從矮到高三階段並排，象徵保障要隨物價成長：樹冠用品牌青綠 teal #00D4FF，盆器用亮 teal，深藍 #0A1628 作土壤陰影與年份小標。樹旁一條向上的扁平階梯狀箭頭以沉穩 teal #00B4D8 表示物價與生活成本上升。背景採淺青綠 #E3F2F4 乾淨冷中性大面積留白，NOT cream, NOT beige, NOT yellow-tinted，大面積留白禁止奶油黃。4:5版型大量留白集中於上半與左側放繁體中文。teal 至少兩處清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念衛教，鼓勵定期檢視保障。禁用保證/一定/最高等字；不放具體保額理賠金額、不出現保單或保險公司商標。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-02.jpg"}, {"id": "concept-c-03", "t": "醫療雜費到底賠不賠？", "c": "社群觀念圖卡", "r": "1:1", "g": ["醫療雜費", "理賠誤解", "問答圖卡"], "p": "乾淨扁平向量問答觀念圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D塑膠感。畫面中央一個大問號與一張簡化的「醫療雜費明細表」扁平圖示並列，象徵常見理賠誤解：明細表外框與問號用品牌青綠 teal #00D4FF，幾個被打勾/打叉的小條目用亮 teal #00D4FF 與沉穩 teal #00B4D8 區分，深藍 #0A1628 作勾叉符號與文字。背景一律乾淨冷中性，採柔白 #FAFCFD 大面積負空間，NOT cream, NOT beige, NOT yellow-tinted。上方約30%留白放繁體中文標題。teal 至少兩處清楚可見（問號＋明細外框）。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風，台灣社群衛教圖卡質感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "釐清理賠觀念用，非招攬。禁用一定賠/絕對/保證等字；明細表不出現真實金額、不出現保險公司商標或商品名。提醒以實際保單條款為準。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-03.jpg"}, {"id": "concept-c-04", "t": "雜費不是收據都能領", "c": "社群觀念圖卡", "r": "16:9", "g": ["醫療雜費", "收據", "資訊圖"], "p": "扁平向量資訊圖橫式圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面是一張簡化的長條醫療收據往下捲，旁邊用扁平勾／叉圖示標出「可申請」與「常被誤會」兩類項目：收據紙張外框與捲度用品牌青綠 teal #00D4FF，分類色塊用沉穩 teal #00B4D8，深藍 #0A1628 作勾叉與細項文字。背景採淺冷灰藍 #EAF0F3 乾淨冷中性，NOT cream, NOT beige, NOT yellow-tinted。16:9版型留白集中於右側放繁體中文標題與分類圖例。teal 至少兩處清楚可見（收據框＋色塊）。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何，台灣社群衛教圖卡。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "衛教釐清雜費認定觀念。禁用一定賠/保證/絕對等字；不放具體金額、不出現保險公司商標或商品名，提醒依實際條款與認定為準。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-04.jpg"}, {"id": "concept-c-05", "t": "看懂醫療單據上的名詞", "c": "社群觀念圖卡", "r": "4:5", "g": ["醫療雜費", "名詞解釋", "觀念卡"], "p": "溫潤扁平向量名詞解釋觀念圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面以三個並排的圓角資訊卡片呈現「住院費／手術費／雜費」三類名詞，每張卡片上方一個簡約扁平小圖示（病床、剪刀、明細）：卡片外框與圖示用品牌青綠 teal #00D4FF，分隔線用沉穩 teal #00B4D8，深藍 #0A1628 作標題與說明文字。背景採柔白 #FAFCFD 乾淨冷中性大面積負空間，NOT cream, NOT beige, NOT yellow-tinted。4:5版型大量留白集中上方放繁體中文主標。teal 至少兩處清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風，溫暖陪伴口吻不用恐懼訴求。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "名詞衛教圖卡。病床圖示僅作分類符號、不呈現病痛或血淋淋畫面；禁用一定賠/保證；不放金額與保險公司商標。提醒以實際保單條款為準。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-05.jpg"}, {"id": "concept-c-06", "t": "住院日額 vs 實支實付", "c": "社群觀念圖卡", "r": "1:1", "g": ["住院日額", "實支實付", "對比圖"], "p": "乾淨扁平向量對比觀念圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D塑膠感。畫面左右對分為兩欄對比：左欄「住院日額」用一個簡約日曆圖示加每日小方塊，右欄「實支實付」用一張收據／單據圖示。左欄主色用沉穩 teal #00B4D8，右欄主色用亮 teal #00D4FF，中間一條垂直分隔線與「VS」字樣用深藍 #0A1628。背景一律乾淨冷中性，採柔白 #FAFCFD 大面積負空間，NOT cream, NOT beige, NOT yellow-tinted。上方約30%留白放繁體中文標題。teal 兩欄各一處清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖，台灣社群衛教圖卡質感。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "兩種給付方式中性比較，不暗示孰優孰劣、不推銷特定商品。禁用最高/唯一/保證等字；不放金額、不出現保險公司商標或商品名。提醒依個人需求與實際條款評估。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-06.jpg"}, {"id": "concept-c-07", "t": "兩種給付怎麼搭比較安心", "c": "社群觀念圖卡", "r": "16:9", "g": ["住院日額", "實支實付", "搭配觀念"], "p": "扁平向量觀念圖橫式圖卡，柔  neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "雙十原則保額為理財參考觀念，倍數僅作示意非保證或承諾。禁用一定/保證/最高等字；不出現具體保額金額對應商品、不放保險公司商標。提醒依個人需求與負擔能力評估。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-09.jpg"}, {"id": "concept-c-10", "t": "三步驟檢視你的保費比例", "c": "社群觀念圖卡", "r": "16:9", "g": ["雙十原則", "三步驟", "流程圖"], "p": "扁平向量流程資訊圖橫式圖卡，柔和手繪線稿、低彩度療癒風，不要寫實照片、不要3D感。畫面為由左到右的三步驟流程：第一步算盤／計算機小圖示、第二步圓餅比例小圖示、第三步打勾清單小圖示，三者用扁平圓形節點＋連接箭頭串接。圓形節點交替用亮 teal #00D4FF 與沉穩 teal #00B4D8，連接箭頭、步驟編號（1/2/3）與說明文字用深藍 #0A1628。背景採柔白 #FAFCFD 乾淨冷中性，NOT cream, NOT beige, NOT yellow-tinted。16:9版型留白集中上方放繁體中文主標、下方放三步驟短說明。teal 至少兩個節點清楚可見。soft natural daylight, neutral-to-cool約5200K, no warm yellow cast。零暖色、乾淨幾何資訊圖風，台灣社群理財衛教圖卡。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "提供自我檢視保費比例的步驟觀念，非投保承諾。禁用一定/保證/最高/穩賺等字；不放金額、不對應特定商品、不出現保險公司商標。提醒依個人財務狀況調整。署名須標所屬公司全名＋業務員登錄字號。", "img": "concept-c-10.jpg"}, {"id": "infographic-a-01", "t": "人生五階段保障時間軸", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["時間軸", "人生階段", "資訊圖"], "p": "乾淨扁平向量資訊圖,柔和手繪線稿、低彩度療癒風,大量負空間。畫面是一條由左至右的水平時間軸,代表人生五個階段(社會新鮮人、成家、育兒、事業高峰、退休樂活),每階段一個簡潔幾何圖示(背包、雙人小屋、嬰兒車、辦公桌、公園長椅)與一個小小的當代台灣東亞臉孔頭像剪影(黑髮或花白短髮、自然健康膚色、單眼皮、台灣日常穿著)。背景牆面一律乾淨冷中性柔白 #FAFCFD,大面積留白,NOT cream NOT beige NOT yellow-tinted。時間軸主線與五個節點圓形用品牌青綠 teal,主線用沉穩 #00B4D8、節點圓與小圖示用亮 teal #00D4FF(全圖至少兩處清楚可見),所有文字與最深陰影用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方留約 25% 純色空間放繁體中文標題「人生五階段 保障時間軸」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念圖解,不放具體保額/理賠金額,不出現保險公司商標或商品名。文字僅作觀念說明,不含招攬話術與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。退休階段以樂活陪伴呈現,不用孤老/病床等恐懼訴求。", "img": "infographic-a-01.jpg"}, {"id": "infographic-a-02", "t": "保障缺口階梯圖", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["階梯圖", "保障缺口", "層次"], "p": "乾淨扁平向量資訊圖,療癒低彩度、柔和手繪線稿,大量負空間。畫面中央是一組由低到高的五階階梯,每一階標示一個保障層次(基本醫療、收入保障、子女教育、退休準備、資產傳承),最高一階與虛線勾勒出的「理想保障」之間留一道可見的缺口(以淺色虛線方框與向上箭頭暗示)。背景一律乾淨冷中性淺冷灰藍 #EAF0F3,大面積留白,NOT cream NOT beige NOT yellow-tinted。階梯實體填色用品牌青綠 teal——下半用沉穩 #00B4D8、頂階與向上箭頭用亮 teal #00D4FF(至少兩處清楚可見);缺口虛線與所有文字用深藍 #0A1628。零暖色。可放一個極簡當代台灣風的小人物剪影(黑髮短髮、台灣日常穿著)站在某一階上仰望上方,人物比例小、可有可無。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。一側留白放繁體中文標題「你的保障缺口在哪一階?」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "缺口為觀念示意,不放具體金額數字,不出現保單/保額/理賠金。文字不含恐懼訴求與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險),以正向「逐階補強」概念呈現,不暗示不買就會出事。", "img": "infographic-a-02.jpg"}, {"id": "infographic-a-03", "t": "家庭責任金字塔", "c": "觀念圖解資訊圖", "r": "4:5", "g": ["金字塔", "家庭責任", "層次圖"], "p": "乾淨扁平向量資訊圖,柔和手繪線稿、低彩度療癒風,大量留白。畫面中央是一座分四層的金字塔,由下而上代表家庭責任層次(基礎生活開銷、房貸與負債、子女教養、長期照顧與晚年陪伴),每層配一個簡潔幾何圖示(餐桌碗筷、台式公寓小屋含鋁窗鐵窗花、書本鉛筆、相牽的手)。背景牆面乾淨冷中性淺青綠 #E3F2F4,大面積負空間,NOT cream NOT beige NOT yellow-tinted。金字塔四層填色由深到淺的品牌青綠 teal——底層沉穩 #00B4D8、上層亮 teal #00D4FF(至少兩處清楚可見);分隔線、圖示描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方與下方留大量空白放繁體中文標題「家庭責任金字塔」與小字層次說明。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念示意圖,不放任何金額/保額/理賠數字,不出現保單或保險公司商標。長期照顧層以「相牽的手」溫暖呈現,禁病床/血淋淋/孤老畫面。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": "infographic-a-03.jpg"}, {"id": "infographic-a-04", "t": "雙薪家庭風險地圖", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["風險地圖", "雙薪家庭", "資訊圖"], "p": "乾淨扁平向量資訊圖,療癒低彩度、柔和幾何扁平風,大量負空間。畫面是一張簡化的「家庭風險地圖」,中央一個台式雙薪家庭小屋(含鋁窗、不鏽鋼鐵窗花),四周以細線連到四個風險區塊節點:其中一位收入中斷、醫療支出、子女教育期、退休準備期,每個節點一個極簡幾何圖示(暫停符號、十字醫療符號、書本、沙漏)。屋內有兩個小小的當代台灣東亞臉孔剪影(黑髮短髮、自然健康膚色、台灣日常穿著)。背景一律乾淨冷中性柔白 #FAFCFD,大面積留白,NOT cream NOT beige NOT yellow-tinted。連線與四個節點圓用品牌青綠 teal,主連線沉穩 #00B4D8、節點與圖示亮 teal #00D4FF(至少兩處清楚可見);屋體描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。一側留白放繁體中文標題「雙薪家庭風險地圖」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "風險以中性圖示示意,不放具體金額/保額,不出現保單或保險公司商標。收入中斷以「暫停符號」中性呈現,不用恐懼訴求。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": "infographic-a-04.jpg"}, {"id": "infographic-a-05", "t": "人生五階段保障重點對照卡", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["對照卡", "人生階段", "版型"], "p": "乾淨扁平向量資訊圖、療癒低彩度、柔和手繪線稿,大量留白。畫面是五張並排的縱向資訊卡,對應人生五階段(單身、新婚、育兒、空巢、退休),每張卡上方一個簡潔幾何圖示與一個極簡當代台灣東亞臉孔頭像(黑髮或花白短髮、自然健康膚色、單眼皮、台灣日常穿著),下方留三條留白橫線示意保障重點(不填具體數字)。背景牆面乾淨冷中性淺冷灰藍 #EAF0F3,卡片底為近白 #FDFEFE,卡與卡之間大量負空間,NOT cream NOT beige NOT yellow-tinted。卡片頂部色條與圖示用品牌青綠 teal——沉穩 #00B4D8 與亮 teal #00D4FF 交替(至少兩處清楚可見);卡片描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方留約 25% 空白放繁體中文標題「五階段保障重點對照」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "對照卡僅作觀念對照,留白橫線不填金額/保額/理賠數字,不出現保單或保險公司商標。退休階段以樂活呈現,不用孤老/病床。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": "infographic-a-05.jpg"}, {"id": "infographic-a-06", "t": "保障缺口三層補強圖", "c": "觀念圖解資訊圖", "r": "1:1", "g": ["保障缺口", "同心圓", "社群卡"], "p": "乾淨扁平向量資訊圖,低彩度療癒、柔和幾何扁平風,大量負空間。畫面中央三個由小到大的同心半圓弧層,由內而外代表三層保障補強(現有保障、補強規劃、理想目標),最外弧與虛線勾勒的目標線之間留一道可見缺口,以淺色虛線弧與向外小箭頭示意。背景一律乾淨冷中性淺青綠 #E3F2F4,四周大面積留白,NOT cream NOT beige NOT yellow-tinted。三層弧填色由深到淺的品牌青綠 teal——內層沉穩 #00B4D8、外層亮 teal #00D4FF(至少兩處清楚可見);虛線缺口與所有文字標籤用深藍 #0A1628。零暖色,無人物或僅極小台灣風小圖示。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方 1:1 約 30% 留白放繁體中文標題「保障缺口 三層補強」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "缺口為觀念示意,不放具體金額/保額/理賠數字,不出現保單或保險公司商標。以正向「逐層補強」概念呈現,不暗示不買即出事、不用恐懼訴求。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": "infographic-a-06.jpg"}, {"id": "infographic-a-07", "t": "家庭責任金字塔頂端是誰", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["金字塔", "家庭責任", "經濟支柱"], "p": "乾淨扁平向量資訊圖,柔和手繪線稿、低彩度療癒風,大量留白。畫面左側一座三層家庭責任金字塔(下層生活與居住、中層子女教養、上層長輩照顧),右側留白區用細線標註每層說明文字。金字塔頂端立一個小小的當代台灣東亞臉孔剪影(經濟支柱角色,黑髮短髮、自然健康膚色、台灣日常襯衫),象徵家庭責任的承擔者。背景牆面乾淨冷中性柔白 #FAFCFD,右側大面積負空間,NOT cream NOT beige NOT yellow-tinted。金字塔三層用品牌青綠 teal 由深到淺——底層沉穩 #00B4D8、頂層亮 teal #00D4FF(至少兩處清楚可見);分隔線、人物描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。右側留白放繁體中文標題「家庭責任的頂端,是誰?」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "純觀念示意,不放金額/保額/理賠數字,不出現保單或保險公司商標。經濟支柱以溫暖承擔呈現,不用留債/孤老/病床等恐懼訴求。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。若預留業務員署名,須標所屬公司全名+業務員登錄字號。", "img": "infographic-a-07.jpg"}, {"id": "infographic-a-08", "t": "雙薪家庭收入支柱風險對照", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["雙薪家庭", "收入支柱", "對照圖"], "p": "乾淨扁平向量資訊圖,療癒低彩度、柔和幾何扁平風,大量負空間。畫面中央一座台式公寓小屋(鋁窗、不鏽鋼鐵窗花)由兩根並立的柱子撐起,左右各代表雙薪家庭的兩位收入支柱,柱旁各一個極簡當代台灣東亞臉孔頭像剪影(黑髮短髮、自然健康膚色、台灣日常穿著)。下方一條中性對照軸,用簡潔圖示示意「兩人都在」與「其中一柱暫停」兩種家庭狀態(以暫停符號中性表達,不用悲情)。背景乾淨冷中性淺冷灰藍 #EAF0F3,屋外大面積留白,NOT cream NOT beige NOT yellow-tinted。兩根柱子與對照軸用品牌青綠 teal——主柱沉穩 #00B4D8、強調節點亮 teal #00D4FF(至少兩處清楚可見);屋體描邊與所有文字用深藍 #0A1628。零暖色。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。一側留白放繁體中文標題「雙薪家庭的兩根支柱」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "收入中斷以中性「暫停符號」示意,不放金額/保額/理賠數字,不出現保單或保險公司商標。不用恐懼訴求與悲情畫面。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": "infographic-a-08.jpg"}, {"id": "infographic-a-09", "t": "人生階段與責任變化曲線", "c": "觀念圖解資訊圖", "r": "16:9", "g": ["曲線圖", "人生階段", "責任變化"], "p": "乾淨扁平向量資訊圖,低彩度療癒、柔和幾何扁平風,大量負空間。畫面是一張簡潔折線/曲線圖:橫軸為人生五階段(單身、成家、育兒、事業高峰、退休),縱軸示意家庭責任的相對高低,曲線先上升至育兒與事業高峰、再緩降至退休,沿線五個節點各配一個極簡幾何小圖示(背包、雙人小屋、嬰兒車、公事包、公園長椅)。背景牆面乾淨冷中性近白 #FDFEFE,大量負空間與留白,NOT cream NOT beige NOT yellow-tinted。曲線與節點用品牌青綠 teal——曲線主體沉穩 #00B4D8、節點圓亮 teal #00D4FF(至少兩處清楚可見);座標軸、刻度與所有文字用深藍 #0A1628。零暖色,無人物或僅極小剪影。soft natural daylight, neutral-to-cool ~5200K, no warm color cast。上方留約 25% 空白放繁體中文標題「責任,會隨人生階段變化」。avoid: cream background, beige walls, yellow color cast, sepia tone, washed-out warm filter, overall amber tint, single warm color temperature flooding the whole frame, simplified chinese, western faces, chinese palace style; no over-saturation, no distorted hands/faces.", "n": "曲線為觀念示意,縱軸不標具體金額/保額/理賠數字,不出現保單或保險公司商標。退休段以樂活呈現,不用恐懼訴求。文字不含招攬與禁字(保證/最高/第一/唯一/穩賺/節稅/避稅/絕對/保本/無風險)。", "img": ""}, {"id": "infographic-a-10", "t": "四大保障觀念一頁速覽", "c": "觀念圖解資訊圖", "r": "4:5", "g": ["四宮格", "觀念速覽", "版型"], "p": "乾淨扁平向量資訊圖、療癒低彩度、柔和手繪線稿,大量留白。畫面為 2×2 四宮格觀念速覽版型,四格各一個簡潔圖示與標題:左上人生五階段時間軸(水平軸縮圖)、右上保障缺口階梯(小階梯縮圖)、左下家庭責任金字塔(三層小金字塔)、右下雙薪家庭風險地圖(小屋含鋁窗鐵  const media=d.img?'<img loading="lazy" src="imgs/'+d.img+'">':'<div class="ph">🎨 圖片生成中<br>點我看提示詞</div>';

function pager(pages,total){
 let h='<button class="pg nav" '+(page<=1?'disabled':'')+' data-p="'+(page-1)+'">‹ 上一頁</button>';

  '<div class="mLbl">完整提示詞</div><div class="mPr">'+esc(d.p)+'</div>'+
  '<button class="mCopy" id="mcopy">📋 複製提示詞</button>'+
  '<div class="mNote">⚠️ '+esc(d.n)+'</div></div>';
 $('#mcopy').onclick=()=>{navigator.clipboard.writeText(d.p);const b=$('#mcopy');b.textContent='✓ 已複製，貼到 ChatGPT/Gemini 就能生圖';b.classList.add('ok');setTimeout(()=>{b.textContent='📋 複製提示詞';b.classList.remove('ok');},1800);};
 $('#ov').classList.add('on');document.body.style.overflow='hidden';
}
function closeModal(){$('#ov').classList.remove('on');document.body.style.overflow='';}
$('#xbtn').onclick=closeModal;
$('#ov').onclick=e=>{if(e.target.id==='ov')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script></body></html>
